spring:
  application:
    name: client-service

  datasource:
    url: jdbc:mysql://localhost:3306/client_db?createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    enabled: false
    register-with-eureka: false
    fetch-registry: false

  instance:
    prefer-ip-address: true